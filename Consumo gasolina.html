<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Consumo y Gasto Anual</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; color: #333; margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .kpi-card { background: #2c3e50; color: white; text-align: center; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .kpi-value { font-size: 1.8rem; font-weight: bold; margin-top: 5px; color: #2ecc71; }
        h2 { margin-top: 0; color: #2c3e50; font-size: 1.2rem; border-bottom: 2px solid #ecf0f1; padding-bottom: 8px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 1rem; font-weight: bold; margin-top: 15px; cursor: pointer; }
        button:active { background: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #ecf0f1; color: #2c3e50; }
        .clear-btn { background: #e74c3c; margin-top: 30px; font-size: 0.8rem; padding: 8px; }
        .mes-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 0.95rem; }
        .mes-item:last-child { border: none; }
    </style>
</head>
<body>

    <div class="kpi-card">
        <div>Gasto Gasolina (Mes Actual)</div>
        <div class="kpi-value" id="gasto-mes">0.00 €</div>
    </div>

    <div class="card">
        <h2>Resumen de Gastos por Mes</h2>
        <div id="historial-mensual"></div>
    </div>

    <div class="card">
        <h2>Nuevo Registro</h2>
        <label>Kilometraje actual (Km):</label>
        <input type="number" id="odometro" step="0.1" placeholder="Ej. 122474">

        <label>Litros repostados (L):</label>
        <input type="number" id="litros" step="0.01" placeholder="0 si es el punto inicial">

        <label>Coste total (€):</label>
        <input type="number" id="coste" step="0.01" placeholder="0 si es el punto inicial">

        <button onclick="agregarRegistro()">Registrar Repostaje</button>
    </div>

    <div class="card">
        <h2>Historial de Repostajes</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Km Total</th>
                        <th>Km Recorridos</th>
                        <th>Litros</th>
                        <th>Coste</th>
                        <th>Consumo</th>
                    </tr>
                </thead>
                <tbody id="tabla-historial"></tbody>
            </table>
        </div>
        <button class="clear-btn" onclick="borrarTodo()">Borrar todos los datos</button>
    </div>

    <script>
        const NOMBRES_MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        document.addEventListener("DOMContentLoaded", cargarHistorial);

        function agregarRegistro() {
            let odomInput = document.getElementById('odometro');
            let litrosInput = document.getElementById('litros');
            let costeInput = document.getElementById('coste');
            
            let odom = parseFloat(odomInput.value);
            let litros = parseFloat(litrosInput.value);
            let coste = parseFloat(costeInput.value);

            if (isNaN(odom) || isNaN(litros) || isNaN(coste)) {
                alert("Por favor, introduce valores válidos en todos los campos.");
                return;
            }

            let historial = JSON.parse(localStorage.getItem('historial_consumo')) || [];
            let consumoText = "Base";
            let distanciaText = "Base";

            if (historial.length > 0) {
                let ultimo = historial[historial.length - 1];
                let distancia = odom - ultimo.odometro;
                
                if (distancia <= 0) {
                    alert("El kilometraje debe ser mayor que el del registro anterior.");
                    return;
                }
                
                distanciaText = distancia.toFixed(1) + " km";

                if (litros > 0) {
                    let calc = (litros / distancia) * 100;
                    consumoText = calc.toFixed(2) + " L/100km";
                } else {
                    consumoText = "N/A";
                }
            }

            let ahora = new Date();
            let nuevo = {
                fechaTxt: ahora.toLocaleDateString(),
                mes: ahora.getMonth(),
                ano: ahora.getFullYear(),
                odometro: odom,
                distancia: distanciaText,
                litros: litros,
                coste: coste,
                consumo: consumoText
            };

            historial.push(nuevo);
            localStorage.setItem('historial_consumo', JSON.stringify(historial));
            
            odomInput.value = "";
            litrosInput.value = "";
            costeInput.value = "";
            
            cargarHistorial();
        }

        function cargarHistorial() {
            let historial = JSON.parse(localStorage.getItem('historial_consumo')) || [];
            let tabla = document.getElementById('tabla-historial');
            let contenedorMeses = document.getElementById('historial-mensual');
            
            tabla.innerHTML = "";
            contenedorMeses.innerHTML = "";

            let ahora = new Date();
            let mesActual = ahora.getMonth();
            let anoActual = ahora.getFullYear();
            let totalMesActual = 0;

            let resumenMeses = {};

            for (let i = historial.length - 1; i >= 0; i--) {
                let reg = historial[i];
                let costeVal = reg.coste || 0;
                
                if (reg.mes === mesActual && reg.ano === anoActual) {
                    totalMesActual += costeVal;
                }

                let claveMes = `${reg.ano}-${reg.mes}`;
                if (!resumenMeses[claveMes]) {
                    resumenMeses[claveMes] = {
                        nombre: `${NOMBRES_MESES[reg.mes]} ${reg.ano}`,
                        total: 0
                    };
                }
                resumenMeses[claveMes].total += costeVal;

                let fila = `<tr>
                    <td>${reg.fechaTxt}</td>
                    <td>${reg.odometro.toLocaleString()}</td>
                    <td><strong>${reg.distancia || "---"}</strong></td>
                    <td>${reg.litros} L</td>
                    <td>${costeVal.toFixed(2)} €</td>
                    <td><strong>${reg.consumo}</strong></td>
                </tr>`;
                tabla.innerHTML += fila;
            }

            let clavesOrdenadas = Object.keys(resumenMeses).sort().reverse();
            
            if (clavesOrdenadas.length === 0) {
                contenedorMeses.innerHTML = "<p style='color:#7f8c8d; margin:0; font-size:0.9rem;'>No hay datos acumulados todavía.</p>";
            } else {
                clavesOrdenadas.forEach(clave => {
                    let item = resumenMeses[clave];
                    let HTMLMes = `<div class="mes-item">
                        <span>${item.nombre}</span>
                        <strong>${item.total.toFixed(2)} €</strong>
                    </div>`;
                    contenedorMeses.innerHTML += HTMLMes;
                });
            }

            document.getElementById('gasto-mes').innerText = totalMesActual.toFixed(2) + " €";
        }

        function borrarTodo() {
            if (confirm("¿Seguro que quieres borrar todo el historial?")) {
                localStorage.removeItem('historial_consumo');
                cargarHistorial();
            }
        }
    </script>
</body>
</html>
