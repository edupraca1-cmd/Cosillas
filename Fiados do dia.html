<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padaria Vicente</title>
    <style>
        :root { --primary: #8B5A2B; --success: #4CAF50; --danger: #C62828; --accent: #FFEB3B; }
        body { font-family: sans-serif; background: #EFEBE9; margin: 0; display: flex; justify-content: center; user-select: none; }
        .phone { width: 100%; max-width: 450px; background: white; height: 100vh; display: flex; flex-direction: column; position: relative; }
        
        /* Caixa de faturamento diário */
        .daily-summary { background: #5D3A1A; color: white; padding: 10px 15px; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .daily-summary b { color: var(--accent); font-size: 1.05rem; }
        .summary-btns { display: flex; gap: 5px; }
        .reset-day-btn { background: none; border: 1px solid rgba(255,255,255,0.4); color: white; border-radius: 4px; padding: 3px 8px; font-size: 0.75rem; cursor: pointer; }

        .nav-tabs { display: flex; background: var(--primary); }
        .tab { flex: 1; padding: 15px; color: white; text-align: center; cursor: pointer; opacity: 0.6; font-weight: bold; }
        .tab.active { opacity: 1; border-bottom: 3px solid white; }
        .content { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 60px; }
        
        .village-group { margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fdfdfd; }
        .village-header { background: #eee; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .client-card { background: white; padding: 12px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        
        .drag-handle { cursor: grab; padding: 5px 10px; font-size: 1.2rem; color: #999; }
        .dragging { opacity: 0.5; background: #f0f0f0; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 20px; width: 90%; border-radius: 10px; max-height: 85vh; overflow-y: auto; }
        .input-num { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 5px; font-size: 0.9rem; }
        
        /* Estilos do Calendário */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 0.85rem; }
        .cal-day-name { font-weight: bold; color: #757575; padding-bottom: 5px; }
        .cal-cell { padding: 8px 0; border-radius: 4px; cursor: pointer; position: relative; font-weight: 500; }
        .cal-cell.has-data::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--primary); border-radius: 50%; }
        .cal-cell.selected { background: var(--primary); color: white; }
        .cal-cell.selected::after { background: var(--accent); }
        .cal-cell.empty { cursor: default; }
        
        .history-item { padding: 8px; border-bottom: 1px solid #eee; font-size: 0.85rem; line-height: 1.4; }
        .footer-btn { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px; background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; text-align: center; font-size: 1rem; }
    </style>
</head>
<body>

<div class="phone">
    <div class="daily-summary">
        <span>Cobrado hoje: <b id="today-earnings">0.00€</b></span>
        <div class="summary-btns">
            <button class="reset-day-btn" onclick="openHistoryModal()" style="background: rgba(255,255,255,0.15);">Ver Histórico</button>
            <button class="reset-day-btn" onclick="resetDailyEarnings()">Zerar Caixa</button>
        </div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" id="tab-ruta" onclick="switchTab('ruta')">Hoje (<span id="day-name"></span>)</div>
        <div class="tab" id="tab-todos" onclick="switchTab('todos')">Todos</div>
    </div>
    <div class="content" id="list"></div>
    <button class="footer-btn" onclick="openAddModal()">+ ADICIONAR CLIENTE</button>
</div>

<!-- Modal Gestão de Conta -->
<div class="modal" id="m-manage">
    <div class="modal-content">
        <h3 id="cname">Cliente</h3>
        <p>Dívida Atual: <b id="cbalance" style="color:var(--danger); font-size:1.2rem;">0.00€</b></p>
        <button style="background:var(--success); color:white; border:none; padding:12px; border-radius:5px; width:100%; font-weight:bold; margin:10px 0; cursor:pointer;" onclick="payAll()">✓ PAGAR TODA A DÍVIDA</button>
        <input type="number" step="0.01" id="v-add" class="input-num" placeholder="Adicionar nova dívida (+)">
        <input type="number" step="0.01" id="v-sub" class="input-num" placeholder="Pagar uma parte (-)">
        <button onclick="saveManagement()" style="width:100%; padding:10px; margin-top:10px; background:var(--primary); color:white; border:none; font-weight:bold; cursor:pointer;">Guardar Alterações</button>
        <button style="background:var(--danger); color:white; border:none; padding:10px; border-radius:5px; width:100%; font-weight:bold; margin-top:15px; cursor:pointer;" onclick="deleteClient()">🗑 Eliminar Cliente</button>
        <button onclick="document.getElementById('m-manage').style.display='none'" style="width:100%; padding:10px; margin-top:10px; cursor:pointer;">Fechar</button>
    </div>
</div>

<!-- Modal Adicionar Cliente -->
<div class="modal" id="m-add">
    <div class="modal-content">
        <h3>Novo Cliente</h3>
        <input type="text" id="n-name" placeholder="Nome" class="input-num">
        
        <label style="font-size:0.85rem; font-weight:bold; display:block; margin-top:10px;">Aldeia:</label>
        <select id="n-village" class="input-num"></select>
        
        <label style="font-size:0.85rem; font-weight:bold; display:block; margin-top:10px;">Dias de entrega:</label>
        <div class="checkbox-group" id="n-days">
            <label><input type="checkbox" value="Segunda-feira"> Seg</label>
            <label><input type="checkbox" value="Terça-feira"> Ter</label>
            <label><input type="checkbox" value="Quarta-feira"> Qua</label>
            <label><input type="checkbox" value="Quinta-feira"> Qui</label>
            <label><input type="checkbox" value="Sexta-feira"> Sex</label>
            <label><input type="checkbox" value="Sábado"> Sáb</label>
        </div>
        <input type="number" step="0.01" id="n-balance" placeholder="Dívida Inicial (€)" class="input-num" style="border:2px solid var(--danger); background:#FFF5F5; margin-top:15px; font-weight:bold;">
        <button onclick="registerClient()" style="width:100%; padding:10px; margin-top:15px; background:var(--success); color:white; border:none; font-weight:bold; cursor:pointer;">GUARDAR REGISTO</button>
        <button onclick="document.getElementById('m-add').style.display='none'" style="width:100%; padding:10px; margin-top:5px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<!-- Modal do Histórico com Calendário -->
<div class="modal" id="m-history">
    <div class="modal-content" style="padding: 15px;">
        <div class="cal-header">
            <button onclick="changeMonth(-1)" style="padding:5px 10px; background:#eee; border:none; font-weight:bold; cursor:pointer;">◀</button>
            <span id="cal-month-year"></span>
            <button onclick="changeMonth(1)" style="padding:5px 10px; background:#eee; border:none; font-weight:bold; cursor:pointer;">▶</button>
        </div>
        
        <div class="cal-grid" id="calendar-grid"></div>
        
        <h4 id="selected-date-title" style="margin: 15px 0 5px 0; border-top: 1px solid #ddd; padding-top: 10px;">Movimentos do dia</h4>
        <div id="history-log" style="max-height: 25vh; overflow-y: auto; border: 1px solid #ddd; background: #fafafa; border-radius: 5px; margin-bottom: 10px;"></div>
        
        <button onclick="clearFullHistory()" style="width:100%; padding:8px; background:var(--danger); color:white; border:none; font-weight:bold; cursor:pointer; border-radius:4px; font-size:0.85rem;">🗑 Limpar Todo o Histórico</button>
        <button onclick="document.getElementById('m-history').style.display='none'" style="width:100%; padding:10px; margin-top:8px; cursor:pointer; font-weight:bold;">Fechar</button>
    </div>
</div>
<script>
    const masterVillages = ["Abrunheiro Grande", "Abrunheiro Pequeno", "Aivado", "Aldeia do Couço", "Aveleira", "Boafafinha", "Boafarinha", "Borda da Ribeira", "Borreiros", "Brejo Cimeiro", "Cabeça do Poço", "Casal Cimeiro", "Cercadas", "Estevais", "Fouto", "Fundada", "Lagoa", "Lousa", "Melriça", "Monte Novo", "Penedo", "Pisão Fundeiro", "Portela", "Relva", "Ribeira", "Seada", "Trutas", "Valadas", "Vale da Urra", "Vale das Casas", "Vale do Grou", "Vila de Rei Lares", "Vilar", "Vilar do Ruivo"].sort();

    const diasSemana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
    const hoy = diasSemana[new Date().getDay()];
    document.getElementById('day-name').innerText = hoy.split('-')[0];

    let clients = JSON.parse(localStorage.getItem('clients') || '[]');
    let villageOrder = JSON.parse(localStorage.getItem('villageOrder') || '[]');
    let logs = JSON.parse(localStorage.getItem('transactionLogs') || '[]');
    let currentTab = 'ruta';
    let targetId = null;

    let dailyData = JSON.parse(localStorage.getItem('dailyData') || '{"date":"","amount":0}');
    
    // Variables para el control del Calendario
    let currentCalDate = new Date();
    let selectedDateStr = "";

    function initApp() {
        const selectVillage = document.getElementById('n-village');
        selectVillage.innerHTML = '';
        masterVillages.forEach(v => {
            let opt = document.createElement('option');
            opt.value = v; opt.innerText = v; selectVillage.appendChild(opt);
        });
        if(villageOrder.length === 0) {
            villageOrder = [...masterVillages];
            localStorage.setItem('villageOrder', JSON.stringify(villageOrder));
        }

        const todayStr = getTodayString();
        if (dailyData.date !== todayStr) {
            dailyData = { date: todayStr, amount: 0 };
            localStorage.setItem('dailyData', JSON.stringify(dailyData));
        }
        updateEarningsDisplay();
        render();
        
        // Inicializar la fecha seleccionada por defecto como el día de hoy
        const d = new Date();
        selectedDateStr = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
    }

    function updateEarningsDisplay() {
        document.getElementById('today-earnings').innerText = dailyData.amount.toFixed(2) + "€";
    }

    function addPaymentToDaily(val) {
        if (val > 0) {
            dailyData.amount += val;
            localStorage.setItem('dailyData', JSON.stringify(dailyData));
            updateEarningsDisplay();
        }
    }

    function logAction(clientName, type, amount) {
        const d = new Date();
        const dateFormatted = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
        const timeFormatted = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0 stream')}`;
        
        logs.unshift({
            date: dateFormatted, time: timeFormatted, name: clientName, type: type, amount: amount
        });
        localStorage.setItem('transactionLogs', JSON.stringify(logs));
    }

    /* LÓGICA DEL CALENDARIO */
    function openHistoryModal() {
        document.getElementById('m-history').style.display = 'flex';
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        const monthYearLabel = document.getElementById('cal-month-year');
        grid.innerHTML = '';

        const year = currentCalDate.getFullYear();
        const month = currentCalDate.getMonth();
        
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        monthYearLabel.innerText = `${meses[month]} ${year}`;

        // Nombres de los días
        const diasCc = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
        diasCc.forEach(d => {
            grid.innerHTML += `<div class="cal-day-name">${d}</div>`;
        });

        const firstDayIndex = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();

        // Celdas vacías al inicio del mes
        for (let i = 0; i < firstDayIndex; i++) {
            grid.innerHTML += `<div class="cal-cell empty"></div>`;
        }

        // Renderizar los días del mes
        for (let day = 1; day <= totalDays; day++) {
            const dateStr = `${String(day).padStart(2, '0')}/${String(month + 1).padStart(2, '0')}/${year}`;
            const hasData = logs.some(l => l.date === dateStr);
            const isSelected = selectedDateStr === dateStr ? 'selected' : '';
            const dataClass = hasData ? 'has-data' : '';

            grid.innerHTML += `<div class="cal-cell ${isSelected} ${dataClass}" onclick="selectCalendarDate('${dateStr}')">${day}</div>`;
        }

        renderDayLogs();
    }

    function changeMonth(dir) {
        currentCalDate.setMonth(currentCalDate.getMonth() + dir);
        renderCalendar();
    }

    function selectCalendarDate(dateStr) {
        selectedDateStr = dateStr;
        renderCalendar();
    }

    function renderDayLogs() {
        document.getElementById('selected-date-title').innerText = `Movimentos de ${selectedDateStr}`;
        const logBox = document.getElementById('history-log');
        logBox.innerHTML = '';

        const dayLogs = logs.filter(l => l.date === selectedDateStr);
        
        if (dayLogs.length === 0) {
            logBox.innerHTML = '<p style="text-align:center; color:#757575; padding:15px; margin:0; font-size:0.85rem;">Nenhum movimento neste dia.</p>';
            return;
        }

        let totalCobradoDia = 0;

        dayLogs.forEach(l => {
            const isPay = l.type === 'pay';
            const sign = isPay ? '✓ Pagou' : '➔ Dívida (+)';
            const color = isPay ? 'var(--success)' : 'var(--danger)';
            const dot = isPay ? '🟢' : '🔴';
            
            if (isPay) totalCobradoDia += l.amount;

            logBox.innerHTML += `
                <div class="history-item">
                    <b>${l.name}</b> <small style="color:#757575; float:right;">${l.time}</small><br>
                    <span style="color:${color}; font-weight:bold;">${dot} ${sign}: ${l.amount.toFixed(2)}€</span>
                </div>`;
        });

        logBox.innerHTML += `
            <div style="padding:10px; background:#E8F5E9; font-weight:bold; text-align:center; font-size:0.9rem; color:#2E7D32;">
                💰 Total Cobrado no Dia: ${totalCobradoDia.toFixed(2)}€
            </div>`;
    }

    function clearFullHistory() {
        if (confirm("Tem certeza que deseja apagar permanentemente TODO o histórico de todos os dias?")) {
            logs = [];
            localStorage.setItem('transactionLogs', JSON.stringify(logs));
            renderCalendar();
        }
    }

    function resetDailyEarnings() {
        if(confirm("Deseja zerar o valor cobrado hoje de volta a 0.00€?")) {
            dailyData.amount = 0; localStorage.setItem('dailyData', JSON.stringify(dailyData)); updateEarningsDisplay();
        }
    }

    function openAddModal() {
        document.getElementById('n-name').value = ''; document.getElementById('n-balance').value = '';
        document.getElementById('n-village').selectedIndex = 0;
        document.querySelectorAll('#n-days input').forEach(cb => cb.checked = false);
        document.getElementById('m-add').style.display = 'flex';
    }

    function switchTab(t) { currentTab = t; document.getElementById('tab-ruta').classList.toggle('active', t==='ruta'); document.getElementById('tab-todos').classList.toggle('active', t==='todos'); render(); }

    function getTodayString() {
        const d = new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    function registerClient() {
        const name = document.getElementById('n-name').value.trim();
        const village = document.getElementById('n-village').value;
        const days = Array.from(document.querySelectorAll('#n-days input:checked')).map(i => i.value);
        const balance = parseFloat(document.getElementById('n-balance').value) || 0;
        
        if(!name) return alert("Por favor, introduza un nome.");
        clients.push({ id: Date.now(), name, village, days, balance, lastModified: balance > 0 ? getTodayString() : "" });
        if (balance > 0) { logAction(name, 'add', balance); }
        localStorage.setItem('clients', JSON.stringify(clients));
        document.getElementById('m-add').style.display = 'none'; render();
    }

    function render() {
        const list = document.getElementById('list'); list.innerHTML = '';
        if(currentTab === 'ruta') {
            let activeRouteClients = clients.filter(c => c.balance > 0 && c.days.includes(hoy) && c.lastModified !== getTodayString());
            activeRouteClients.sort((a, b) => {
                const villageDiff = villageOrder.indexOf(a.village) - villageOrder.indexOf(b.village);
                if (villageDiff !== 0) return villageDiff;
                return clients.findIndex(c => c.id === a.id) - clients.findIndex(c => c.id === b.id);
            });
            if(activeRouteClients.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#757575; margin-top:30px;">Rota concluída ou sem clientes pendentes hoje (${hoy.split('-')[0]}).</p>`; return;
            }
            activeRouteClients.forEach(c => {
                list.innerHTML += `<div class="client-card" onclick="openM(${c.id})"><div style="flex:1;"><strong>${c.name}</strong><br><small>${c.village}</small></div><b style="color:var(--danger); margin-right:10px;">${c.balance.toFixed(2)}€</b></div>`;
            });
        } else {
            const activeVillages = villageOrder.filter(v => clients.some(c => c.village === v));
            if(activeVillages.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#757575; margin-top:30px;">Nenhum cliente registado.</p>`; return;
            }
            activeVillages.forEach(v => {
                const group = clients.filter(c => c.village === v);
                let groupHtml = `<div class="village-group" data-village="${v}"><div class="village-header"><span onclick="let box = this.parentElement.nextElementSibling; box.style.display=(box.style.display==='none'?'block':'none')" style="cursor:pointer; flex:1;">📍 ${v} (${group.length}) ▾</span><div class="drag-handle handle-v">☰</div></div><div style="display:none" class="client-box" data-village="${v}">`;
                group.forEach(c => {
                    groupHtml += `<div class="client-card" data-id="${c.id}" onclick="openM(${c.id})"><div style="flex:1;"><div>${c.name}</div><b style="${c.balance > 0 ? 'color:var(--danger);' : 'color:#9e9e9e;'} font-size:0.9rem;">${c.balance.toFixed(2)}€</b></div><div class="drag-handle handle-c" onclick="event.stopPropagation()">☰</div></div>`;
                });
                groupHtml += `</div></div>`; list.innerHTML += groupHtml;
            });
            setupDragAndDrop();
        }
    }

    function setupDragAndDrop() {
        let draggedItem = null; let dragType = null;
        document.querySelectorAll('.handle-v').forEach(handle => {
            const item = handle.closest('.village-group'); handle.ontouchstart = (e) => { draggedItem = item; dragType = 'village'; item.classList.add('dragging'); }; handle.ontouchend = () => { saveDraggedOrder(); };
        });
        document.querySelectorAll('.handle-c').forEach(handle => {
            const item = handle.closest('.client-card'); handle.ontouchstart = (e) => { draggedItem = item; dragType = 'client'; item.classList.add('dragging'); }; handle.ontouchend = () => { saveDraggedOrder(); };
        });
        const container = document.getElementById('list');
        container.ontouchmove = (e) => {
            if (!draggedItem) return; e.preventDefault(); const touch = e.touches[0]; const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (dragType === 'village') {
                const nextGroup = target.closest('.village-group');
                if (nextGroup && nextGroup !== draggedItem) {
                    const rect = nextGroup.getBoundingClientRect(); const next = (touch.clientY - rect.top) / (rect.bottom - rect.top) > 0.5; container.insertBefore(draggedItem, next ? nextGroup.nextSibling : nextGroup);
                }
            } else if (dragType === 'client') {
                const pBox = draggedItem.closest('.client-box'); const nextClient = target.closest('.client-card');
                if (nextClient && nextClient !== draggedItem && nextClient.closest('.client-box') === pBox) {
                    const rect = nextClient.getBoundingClientRect(); const next = (touch.clientY - rect.top) / (rect.bottom - rect.top) > 0.5; pBox.insertBefore(draggedItem, next ? nextClient.nextSibling : nextClient);
                }
            }
        };

        function saveDraggedOrder() {
            if (!draggedItem) return; draggedItem.classList.remove('dragging');
            if (dragType === 'village') {
                const newOrder = Array.from(document.querySelectorAll('.village-group')).map(el => el.dataset.village); villageOrder = [...newOrder, ...villageOrder.filter(v => !newOrder.includes(v))]; localStorage.setItem('villageOrder', JSON.stringify(villageOrder));
            } else if (dragType === 'client') {
                const vName = draggedItem.closest('.client-box').dataset.village; const newClientIds = Array.from(document.querySelectorAll(`.client-box[data-village="${vName}"] .client-card`)).map(el => parseInt(el.dataset.id)); let remainingClients = clients.filter(c => c.village !== vName); let reorderedGroup = newClientIds.map(id => clients.find(c => c.id === id)); clients = [...remainingClients, ...reorderedGroup]; localStorage.setItem('clients', JSON.stringify(clients));
            }
            draggedItem = null; dragType = null; render();
        }
    }

    function openM(id) { targetId = id; let c = clients.find(x => x.id === id); document.getElementById('cname').innerText = c.name; document.getElementById('cbalance').innerText = c.balance.toFixed(2) + "€"; document.getElementById('v-add').value = ''; document.getElementById('v-sub').value = ''; document.getElementById('m-manage').style.display = 'flex'; }
    
    function payAll() { 
        let c = clients.find(x => x.id === targetId);
        if (c.balance > 0) { addPaymentToDaily(c.balance); logAction(c.name, 'pay', c.balance); }
        c.balance = 0; c.lastModified = getTodayString(); localStorage.setItem('clients', JSON.stringify(clients)); document.getElementById('m-manage').style.display = 'none'; render(); 
    }
    
    function saveManagement() { 
        let c = clients.find(x => x.id === targetId); 
        const addedInput = parseFloat(document.getElementById('v-add').value) || 0;
        if (addedInput > 0) { c.balance += addedInput; logAction(c.name, 'add', addedInput); }
        const paymentInput = parseFloat(document.getElementById('v-sub').value) || 0;
        if (paymentInput > 0) {
            const realPaid = paymentInput > c.balance ? c.balance : paymentInput; addPaymentToDaily(realPaid); logAction(c.name, 'pay', realPaid); c.balance -= realPaid;
        }
        if(c.balance < 0) c.balance = 0; 
        c.lastModified = getTodayString(); localStorage.setItem('clients', JSON.stringify(clients)); document.getElementById('m-manage').style.display = 'none'; render(); 
    }
    
    function deleteClient() { let c = clients.find(x => x.id === targetId); if (confirm(`Eliminar "${c.name}"?`)) { clients = clients.filter(x => x.id !== targetId); localStorage.setItem('clients', JSON.stringify(clients)); document.getElementById('m-manage').style.display = 'none'; render(); } }
    
    window.onload = initApp;
</script>
</body>
</html>
